spring:
  application:
    name: ridewatch-backend
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/ridewatch
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  profiles:
    active: dev

logging:
  level:
    com.ridewatch: DEBUG
    org.springframework.security: DEBUG

app:
  jwt:
    secret: your-secret-key-change-this-in-production-min-32-chars-required
    expiration-ms: 86400000
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"

server:
  port: 8080
  servlet:
    context-path: /api
